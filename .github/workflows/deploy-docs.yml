# Push docs/ to gh-pages for GitHub Pages. Site source on branch `docs`; main does not track docs/.
# Repo Settings → Pages → Deploy from a branch → Branch: gh-pages, / (root).
name: Deploy docs to gh-pages

on:
  push:
    branches: [docs]
    paths:
      - 'docs/**'
      - '.github/workflows/deploy-docs.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          force_orphan: true
